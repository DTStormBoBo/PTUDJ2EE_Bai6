<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
    xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{_layout}">
<head>
    <meta charset="UTF-8">
    <title>Danh Sách Sản Phẩm</title>
</head>
<body>
<div layout:fragment="content">
    <style>
        .page-header {
            background: linear-gradient(135deg, #1a1a2e, #0f3460);
            color: white;
            border-radius: 12px;
            padding: 1.5rem;
            margin: 0 auto 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 2px 8px rgba(15, 52, 96, 0.15);
            max-width: 1200px;
        }

        .page-header h2 {
            margin: 0;
            font-weight: 700;
            font-size: 1.5rem;
            letter-spacing: 0.5px;
        }

        .page-header p {
            margin: 0.3rem 0 0;
            opacity: 0.8;
            font-size: 0.85rem;
        }

        .btn-add {
            background: linear-gradient(135deg, #e94560, #c73652);
            color: white;
            border: none;
            padding: 0.5rem 1.2rem;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.85rem;
            text-decoration: none;
            transition: all 0.25s ease;
            box-shadow: 0 2px 8px rgba(233, 69, 96, 0.2);
            cursor: pointer;
        }

        .btn-add:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(233, 69, 96, 0.3);
            color: white;
        }

        .table-card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
            overflow: hidden;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
        }

        .table-card table {
            margin: 0;
            width: 100%;
            table-layout: fixed;
        }

        .table thead {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            color: white;
        }

        .table thead th {
            font-weight: 600;
            font-size: 0.8rem;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            padding: 0.9rem 1rem;
            border: none;
        }

        .table tbody tr {
            transition: background 0.15s ease;
            border-bottom: 1px solid #f0f0f0;
        }

        .table tbody tr:hover {
            background-color: #f8f9ff;
        }

        .table tbody td {
            padding: 0.8rem 1rem;
            vertical-align: middle;
            font-size: 0.9rem;
        }

        .product-id {
            background: #f0f2f5;
            color: #555;
            font-weight: 600;
            font-size: 0.75rem;
            padding: 2px 6px;
            border-radius: 4px;
            display: inline-block;
        }

        .product-name {
            font-weight: 600;
            color: #1a1a2e;
        }

        .product-img {
            border-radius: 8px;
            object-fit: cover;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
            border: 1px solid #f0f2f5;
        }

        .price-badge {
            background: #e8f5e9;
            color: #2e7d32;
            font-weight: 700;
            padding: 3px 10px;
            border-radius: 16px;
            font-size: 0.85rem;
            display: inline-block;
        }

        .category-badge {
            background: #e3f2fd;
            color: #1565c0;
            font-weight: 600;
            padding: 3px 10px;
            border-radius: 16px;
            font-size: 0.8rem;
            display: inline-block;
        }

        .btn-edit {
            background: #0f3460;
            color: white;
            border: none;
            padding: 0.3rem 0.8rem;
            border-radius: 6px;
            font-size: 0.8rem;
            font-weight: 500;
            transition: all 0.2s ease;
            cursor: pointer;
        }

        .btn-edit:hover {
            transform: translateY(-1px);
            box-shadow: 0 2px 8px rgba(15, 52, 96, 0.3);
        }

        .btn-delete {
            background: #e94560;
            color: white;
            border: none;
            padding: 0.3rem 0.8rem;
            border-radius: 6px;
            font-size: 0.8rem;
            font-weight: 500;
            transition: all 0.2s ease;
            cursor: pointer;
        }

        .btn-delete:hover {
            transform: translateY(-1px);
            box-shadow: 0 2px 8px rgba(233, 69, 96, 0.3);
        }

        .empty-state {
            text-align: center;
            padding: 3rem 2rem;
            color: #aaa;
        }

        .empty-state i {
            font-size: 3rem;
            margin-bottom: 1rem;
            color: #ddd;
        }
    </style>

    <!-- Page Header removed; using layout header with pageTitle/pageSubtitle/headerButtonsHtml -->
    <!--
    <div class="page-header">
        <div>
            <h2><i class="fas fa-boxes me-2"></i>Danh Sách Sản Phẩm</h2>
            <p>Quản lý toàn bộ sản phẩm của bạn</p>
        </div>
        <a th:href="@{/products/add}" class="btn-add" sec:authorize="hasRole('ADMIN')">
            <i class="fas fa-plus me-2"></i>Thêm Sản Phẩm
        </a>
        <a th:href="@{/categories}" class="btn-add" sec:authorize="hasRole('ADMIN')">
            <i class="fas fa-plus me-2"></i>Danh mục
        </a>
    </div>
    -->

    <!-- Search, Filter, Sort Bar -->
    <div style="background: white; border-radius: 12px; padding: 1.2rem 1.5rem; margin: 0 auto 2rem; max-width: 1200px; box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);">
        <form method="get" th:action="@{/products}" id="searchForm" style="display: flex; gap: 1rem; align-items: flex-end; flex-wrap: wrap;">
            
            <!-- Search Keyword -->
            <div style="flex: 1; min-width: 200px;">
                <label for="keyword" style="font-weight: 500; color: #333; display: block; margin-bottom: 0.4rem; font-size: 0.9rem;">
                    Tìm kiếm
                </label>
                <input type="text" id="keyword" name="keyword" class="form-control" 
                       th:value="${keyword}" placeholder="Nhập tên sản phẩm..." 
                       style="border-radius: 6px; border: 1px solid #ddd; padding: 0.5rem 0.8rem; font-size: 0.9rem;">
            </div>

            <!-- Filter by Category with Clear Button -->
            <div style="flex: 1; min-width: 200px; position: relative;">
                <label for="categoryId" style="font-weight: 500; color: #333; display: block; margin-bottom: 0.4rem; font-size: 0.9rem;">
                    Danh mục
                </label>
                <div style="position: relative; display: flex; align-items: center;">
                    <select id="categoryId" name="categoryId" class="form-control" 
                            style="border-radius: 6px; border: 1px solid #ddd; padding: 0.5rem 0.8rem; font-size: 0.9rem; padding-right: 2.5rem;">
                        <option value="">-- Tất cả --</option>
                        <option th:each="cat : ${categories}" 
                                th:value="${cat.id}" 
                                th:text="${cat.name}"
                                th:selected="${categoryId != null && categoryId == cat.id}"></option>
                    </select>
                    <button type="button" id="clearCategory" 
                            th:style="${categoryId != null && categoryId != '' ? 'display: block' : 'display: none'}"
                            style="position: absolute; right: 8px; background: none; border: none; cursor: pointer; color: #999; font-size: 1.2rem; padding: 0;"
                            onclick="document.getElementById('categoryId').value=''; document.getElementById('clearCategory').style.display='none'; document.getElementById('searchForm').submit();">
                        ✕
                    </button>
                </div>
            </div>

            <!-- Sort by Price with Clear Button -->
            <div style="flex: 0.8; min-width: 140px; position: relative;">
                <label for="sort" style="font-weight: 500; color: #333; display: block; margin-bottom: 0.4rem; font-size: 0.9rem;">
                    Sắp xếp giá
                </label>
                <div style="position: relative; display: flex; align-items: center;">
                    <select id="sort" name="sort" class="form-control" 
                            style="border-radius: 6px; border: 1px solid #ddd; padding: 0.5rem 0.8rem; font-size: 0.9rem;">
                        <option value="asc">↑ Thấp đến cao</option>
                        <option value="desc">↓ Cao đến thấp</option>
                    </select>
                </div>
            </div>

            <!-- Search Button -->
            <button type="submit" style="background: linear-gradient(135deg, #e94560, #c73652); color: white; border: none; padding: 0.5rem 1.2rem; border-radius: 6px; font-weight: 600; font-size: 0.9rem; cursor: pointer; transition: all 0.25s ease; height: 38px; display: flex; align-items: center; gap: 0.5rem;"
                    onmouseover="this.style.boxShadow='0 4px 12px rgba(233, 69, 96, 0.4)'; this.style.transform='translateY(-1px)';"
                    onmouseout="this.style.boxShadow='none'; this.style.transform='translateY(0)';">
                <i class="fas fa-search"></i> Tìm
            </button>
        </form>
    </div>

    <!-- Table -->
    <div class="table-card">
        <table class="table table-hover">
            <thead>
            <tr>
                <th><i class="fas fa-hashtag me-1"></i>ID</th>
                <th><i class="fas fa-tag me-1"></i>Tên Sản Phẩm</th>
                <th><i class="fas fa-image me-1"></i>Hình Ảnh</th>
                <th><i class="fas fa-dollar-sign me-1"></i>Giá</th>
                <th><i class="fas fa-th-large me-1"></i>Danh Mục</th>
                <th><i class="fas fa-cogs me-1"></i>Thao Tác</th>
            </tr>
            </thead>
            <tbody>
            <tr th:if="${#lists.isEmpty(products.content)}">
                <td colspan="6">
                    <div class="empty-state">
                        <i class="fas fa-box-open"></i>
                        <p class="mt-2 fs-5 fw-semibold">Chưa có sản phẩm nào</p>
                        <a th:href="@{/products/add}" class="btn-add mt-2 d-inline-block" sec:authorize="hasRole('ADMIN')">
                            <i class="fas fa-plus me-1"></i>Thêm ngay
                        </a>
                    </div>
                </td>
            </tr>
            <tr th:each="product: ${products.content}">
                <td><span class="product-id" th:text="${product.id}"></span></td>
                <td><span class="product-name" th:text="${product.name}"></span></td>
                <td>
                    <img class="product-img" height="70" width="90"
                         th:src="${product.image != null ? product.image : '/upload/images/default.jpg'}" 
                         alt="Product Image"
                         onerror="this.src='/upload/images/default.jpg'">
                </td>
                <td>
                    <span class="price-badge">
                        <i class="fas fa-dong-sign me-1"></i>
                        <span th:text="${#numbers.formatDecimal(product.price, 0, 'COMMA', 0, 'POINT')}"></span>
                    </span>
                </td>
                <td>
                    <span class="category-badge"
                          th:text="${product.category != null ? product.category.name : 'N/A'}"></span>
                </td>
                <td>
                    <!-- For ADMIN: Show Edit/Delete buttons -->
                    <div class="d-flex gap-2" sec:authorize="hasRole('ADMIN')">
                        <form th:action="@{/products/edit/{id}(id=${product.id})}" method="get" style="display:inline;">
                            <button type="submit" class="btn-edit">
                                <i class="fas fa-pen me-1"></i>Sửa
                            </button>
                        </form>
                        <form th:action="@{/products/delete/{id}(id=${product.id})}" method="post"
                              style="display:inline;"
                              onsubmit="return confirm('Bạn có chắc muốn xóa sản phẩm này?')">
                            <button type="submit" class="btn-delete">
                                <i class="fas fa-trash me-1"></i>Xóa
                            </button>
                        </form>
                    </div>
                    
                    <!-- For USER: Show Add to Cart button -->
                    <a th:href="@{/cart/add/{id}(id=${product.id})}" 
                       class="btn-add" 
                       sec:authorize="hasRole('USER')"
                       style="padding: 0.3rem 0.8rem; font-size: 0.85rem; display: inline-block;">
                        <i class="fas fa-shopping-cart me-1"></i>Thêm giỏ
                    </a>
                </td>
            </tr>
            </tbody>
        </table>
    </div>

    <!-- Pagination - Simple Style -->
    <div style="background: white; border-radius: 12px; padding: 1.5rem; margin: 2rem auto 0; max-width: 1200px; text-align: center; box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);">
        <div style="display: flex; gap: 0.5rem; justify-content: center; align-items: center; flex-wrap: wrap;">
            <!-- Previous Button -->
            <a th:if="${products.hasPrevious()}"
               th:href="@{/products(page=${products.number - 1}, keyword=${keyword}, categoryId=${categoryId}, sort=${sort})}"
               style="padding: 0.5rem 0.8rem; color: #0f3460; text-decoration: none; font-weight: 600; cursor: pointer;">
                &lt;
            </a>
            <span th:if="${!products.hasPrevious()}" 
                  style="padding: 0.5rem 0.8rem; color: #ccc; font-weight: 600;">
                &lt;
            </span>

            <!-- Page Numbers -->
            <span th:each="i : ${#numbers.sequence(0, products.totalPages - 1)}" 
                  th:if="${i >= products.number - 2 && i <= products.number + 2}"
                  style="display: inline-block;">
                <a th:if="${i != products.number}"
                   th:href="@{/products(page=${i}, keyword=${keyword}, categoryId=${categoryId}, sort=${sort})}"
                   th:text="${i + 1}"
                   style="padding: 0.5rem 0.8rem; color: #0f3460; text-decoration: none; font-weight: 500; cursor: pointer; display: inline-block;"></a>
                <span th:if="${i == products.number}" 
                      th:text="${i + 1}"
                      style="padding: 0.5rem 0.8rem; color: white; background: #0f3460; border-radius: 4px; font-weight: 600; display: inline-block; min-width: 35px;"></span>
            </span>

            <!-- Next Button -->
            <a th:if="${products.hasNext()}"
               th:href="@{/products(page=${products.number + 1}, keyword=${keyword}, categoryId=${categoryId}, sort=${sort})}"
               style="padding: 0.5rem 0.8rem; color: #0f3460; text-decoration: none; font-weight: 600; cursor: pointer;">
                &gt;
            </a>
            <span th:if="${!products.hasNext()}" 
                  style="padding: 0.5rem 0.8rem; color: #ccc; font-weight: 600;">
                &gt;
            </span>
        </div>
        
        <!-- Pagination Info -->
        <div style="margin-top: 1rem; color: #666; font-size: 0.85rem;">
            <span th:text="'Trang ' + ${products.number + 1} + ' / ' + ${products.totalPages} + ' | ' + ${products.totalElements} + ' sản phẩm'"></span>
        </div>
    </div>
</div>
</body>
</html>
