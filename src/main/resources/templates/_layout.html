<!DOCTYPE html>
<html lang="en"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    xmlns:th="http://www.thymeleaf.org"
    xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Quản Lý Sản Phẩm</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          integrity="sha384-QWTKZyjpPEjISv5WaRU90FeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEWIH" crossorigin="anonymous"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f0f2f5;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .navbar {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%) !important;
            box-shadow: 0 2px 20px rgba(0,0,0,0.3);
            padding: 0.8rem 1.5rem;
        }
        .navbar-brand {
            color: #e0e0e0 !important;
            font-weight: 500;
            font-size: 0.95rem;
            padding: 0.4rem 0.9rem;
            border-radius: 8px;
            transition: all 0.2s ease;
        }
        .navbar-brand:hover {
            color: #fff !important;
            background-color: rgba(255,255,255,0.1);
        }
        .navbar-brand.brand-title {
            font-size: 1.2rem;
            font-weight: 700;
            color: #fff !important;
            letter-spacing: 0.5px;
        }
        .navbar-brand.brand-title i {
            color: #e94560;
        }
        .main-content {
            flex: 1;
            padding: 2rem 1rem;
            display: flex;
            justify-content: center;
        }
        .layout-header {
            width: 100%;
            display: flex;
            justify-content: center;
            padding: 1.2rem 1rem 0 1rem;
        }
        .layout-header .header-card {
            width: 100%;
            max-width: 1200px;
            background: linear-gradient(135deg, #1a2a45, #0f3460);
            color: white;
            border-radius: 12px;
            padding: 1.4rem 1.8rem;
            box-shadow: 0 10px 30px rgba(15,52,96,0.12);
            display:flex;
            align-items:center;
            justify-content:space-between;
            gap:1rem;
        }
        .header-title { font-size:1.5rem; font-weight:700; }
        .header-subtitle { opacity:0.8; font-size:0.95rem; }
        .main-content .container {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0;
        }
        .footer {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            color: #aaa;
            padding: 1.2rem 0;
            text-align: center;
            font-size: 0.85rem;
            margin-top: auto;
        }
        .footer span {
            color: #e94560;
        }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg">
    <div class="container-fluid" style="padding-left: 30px;">
        <a class="navbar-brand brand-title" th:href="@{/products}">
            <i class="fas fa-box-open me-2"></i>ProductManager
        </a>
        <div class="ms-3">
            <a class="navbar-brand" th:href="@{/products}">
                <i class="fas fa-home me-1"></i>Home
            </a>
            <a class="navbar-brand" th:href="@{/products/add}" sec:authorize="hasRole('ADMIN')">
                <i class="fas fa-plus-circle me-1"></i>Add Product
            </a>
            <a class="navbar-brand" th:href="@{/categories}" sec:authorize="hasRole('ADMIN')">
                <i class="fas fa-plus-circle me-1"></i>Category
            </a>
        </div>
        <div class="ms-auto d-flex align-items-center">
            <div th:if="${currentUser != null or showNavbar == true}" class="text-end">
                <form th:action="@{/logout}" method="post" style="display:inline;">
                    <button type="submit" class="btn btn-sm btn-outline-light">
                        <i class="fas fa-sign-out-alt me-1"></i>Đăng xuất
                    </button>
                </form>
                <div class="navbar-brand" style="color:#fff; font-size:0.95rem; padding:0.2rem 0;">
                    Xin chào, <span th:text="${currentUser}"></span>
                </div>
            </div>
            <a class="navbar-brand ms-3" th:if="${currentUser == null and not showNavbar}" th:href="@{/login}">
                <i class="fas fa-sign-in-alt me-1"></i>Đăng nhập
            </a>
        </div>
    </div>
</nav>

<!-- Optional page header (set from controller via model: pageTitle, pageSubtitle, headerButtonsHtml) -->
<div class="layout-header" th:if="${pageTitle != null}">
    <div class="header-card">
        <div>
            <div class="header-title" th:text="${pageTitle}">Page Title</div>
            <div class="header-subtitle" th:text="${pageSubtitle}"></div>
        </div>
        <div th:utext="${headerButtonsHtml}"></div>
    </div>
</div>

<div class="main-content">
    <div layout:fragment="content" class="container">
    </div>
</div>

<footer class="footer">
    <p class="mb-0">
        &copy; 2025 <span>Phát triển ứng dụng với J2EE</span> &mdash; All rights reserved
    </p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc4s9bIOgUxi8T/jzmqZaAkZdMSKD3mRwAzVgOCOR/h" crossorigin="anonymous"></script>
</body>
</html>
