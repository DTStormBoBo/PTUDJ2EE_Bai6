<!DOCTYPE html>
<html lang="en"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Đăng nhập - Quản lý Sản phẩm</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          integrity="sha384-QWTKZyjpPEjISv5WaRU90FeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEWIH" crossorigin="anonymous"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(15,52,96,0.18);
            padding: 2.5rem 2rem;
            width: 100%;
            max-width: 420px;
        }
        .login-header {
            text-align: center;
            margin-bottom: 1.75rem;
        }
        .login-header h1 {
            font-size: 1.6rem;
            color: #1a1a2e;
            font-weight: 700;
            margin-bottom: 0.25rem;
        }
        .login-header p {
            color: #666;
            font-size: 0.95rem;
        }
        .form-group { margin-bottom: 1.25rem; }
        .form-label { font-weight: 600; color: #333; margin-bottom: 0.35rem; display:block; }
        .form-control {
            border: 1px solid #eef2f7;
            border-radius: 10px;
            padding: 0.75rem;
            font-size: 0.95rem;
            display: block;
            width: 100%;
            box-sizing: border-box;
            outline: none;
            box-shadow: none !important;
        }
        .form-control:focus { border-color: #16213e !important; box-shadow: none !important; outline: none; }

        /* Normalize browser autofill styles (Chrome) */
        input:-webkit-autofill,
        input:-webkit-autofill:focus,
        textarea:-webkit-autofill,
        textarea:-webkit-autofill:focus {
            -webkit-box-shadow: 0 0 0 30px white inset !important;
            box-shadow: 0 0 0 30px white inset !important;
            -webkit-text-fill-color: #000 !important;
        }

        /* Button style aligned with products list (.btn-add) */
        .btn-login {
            width: 100%;
            padding: 0.65rem;
            background: linear-gradient(135deg, #e94560 0%, #c73652 100%);
            border: none;
            border-radius: 10px;
            color: white;
            font-weight: 700;
            font-size: 0.95rem;
            transition: transform 0.18s ease, box-shadow 0.18s ease;
            margin-top: 0.5rem;
        }
        .btn-login:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(201,55,82,0.18); }

        .error-message { color:#dc3545; font-size:0.9rem; margin-bottom:1rem; padding:0.65rem; background:#fff4f5; border-radius:8px; }
        .success-message { color:#155724; font-size:0.9rem; margin-bottom:1rem; padding:0.65rem; background:#f3fff4; border-radius:8px; }

        .login-icon { width:56px; height:56px; margin:0 auto 1rem; background:linear-gradient(135deg,#e94560,#c73652); border-radius:50%; display:flex; align-items:center; justify-content:center; color:#fff; font-size:1.4rem; }
    </style>
</head>
<body>
<div class="login-container">
    <div class="login-header">
        <div class="login-icon">
            <i class="fas fa-lock"></i>
        </div>
        <h1>Đăng nhập</h1>
        <p>Vui lòng đăng nhập để tiếp tục</p>
    </div>

    <div th:if="${param.logout}" class="success-message">
        <i class="fas fa-check-circle me-2"></i> Bạn đã đăng xuất thành công.
    </div>

    <div th:if="${param.error}" class="error-message">
        <i class="fas fa-exclamation-circle me-2"></i> Tên đăng nhập hoặc mật khẩu không đúng.
    </div>

    <form method="post" th:action="@{/login}">
        <div class="form-group">
            <label for="username" class="form-label">Tên đăng nhập</label>
            <input type="text" class="form-control" id="username" name="username"
                   placeholder="Nhập tên đăng nhập" required autofocus/>
        </div>

        <div class="form-group">
            <label for="password" class="form-label">Mật khẩu</label>
            <input type="password" class="form-control" id="password" name="password"
                   placeholder="Nhập mật khẩu" required/>
        </div>

        <button type="submit" class="btn-login">
            <i class="fas fa-sign-in-alt me-2"></i>Đăng nhập
        </button>
    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc4s9bIOgUxi8T/jzmqZaAkZdMSKD3mRwAzVgOCOR/h" crossorigin="anonymous"></script>
</body>
</html>
