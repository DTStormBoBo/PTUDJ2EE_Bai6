<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
    xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{_layout}">
<head>
    <meta charset="UTF-8">
    <title>Giỏ Hàng</title>
</head>
<body>
<div layout:fragment="content">
    <style>
        .cart-header {
            background: linear-gradient(135deg, #1a1a2e, #0f3460);
            color: white;
            border-radius: 12px;
            padding: 1.5rem;
            margin: 0 auto 2rem;
            max-width: 1200px;
        }

        .cart-container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .cart-empty {
            background: white;
            border-radius: 12px;
            padding: 3rem 2rem;
            text-align: center;
            color: #aaa;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
        }

        .cart-empty i {
            font-size: 3rem;
            margin-bottom: 1rem;
            color: #ddd;
        }

        .cart-table {
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
            overflow: hidden;
            margin-bottom: 2rem;
        }

        .cart-table table {
            width: 100%;
            border-collapse: collapse;
        }

        .cart-table thead {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            color: white;
        }

        .cart-table th {
            padding: 1rem;
            text-align: left;
            font-weight: 600;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .cart-table td {
            padding: 1rem;
            border-bottom: 1px solid #f0f0f0;
            vertical-align: middle;
        }

        .cart-table tr:hover {
            background-color: #f8f9ff;
        }

        .product-info {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        .product-image {
            width: 60px;
            height: 60px;
            border-radius: 8px;
            object-fit: cover;
            border: 1px solid #f0f2f5;
        }

        .product-name {
            font-weight: 600;
            color: #1a1a2e;
        }

        .quantity-input {
            width: 60px;
            padding: 0.4rem;
            border: 1px solid #ddd;
            border-radius: 6px;
            text-align: center;
            font-size: 0.9rem;
        }

        .btn-remove {
            background: #e94560;
            color: white;
            border: none;
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.2s ease;
        }

        .btn-remove:hover {
            background: #c73652;
            transform: translateY(-1px);
        }

        .btn-update {
            background: #0f3460;
            color: white;
            border: none;
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.2s ease;
        }

        .btn-update:hover {
            background: #16213e;
            transform: translateY(-1px);
        }

        .cart-summary {
            background: white;
            border-radius: 12px;
            padding: 2rem;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
            max-width: 400px;
            margin-left: auto;
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            padding: 0.8rem 0;
            font-size: 0.95rem;
            border-bottom: 1px solid #f0f0f0;
        }

        .summary-row.total {
            border: none;
            padding: 1rem 0 0;
            font-size: 1.1rem;
            font-weight: 700;
            color: #1a1a2e;
        }

        .price-value {
            color: #e94560;
            font-weight: 600;
        }

        .action-buttons {
            display: flex;
            gap: 1rem;
            margin-top: 2rem;
        }

        .btn-checkout {
            flex: 1;
            background: linear-gradient(135deg, #e94560, #c73652);
            color: white;
            border: none;
            padding: 0.8rem;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            text-decoration: none;
            text-align: center;
            display: inline-block;
        }

        .btn-checkout:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(233, 69, 96, 0.3);
        }

        .btn-continue {
            flex: 1;
            background: #f0f0f0;
            color: #333;
            border: 1px solid #ddd;
            padding: 0.8rem;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            text-decoration: none;
            text-align: center;
            display: inline-block;
        }

        .btn-continue:hover {
            background: #ddd;
        }

        .btn-clear {
            background: #999;
            color: white;
            border: none;
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.2s ease;
        }

        .btn-clear:hover {
            background: #777;
        }
    </style>

    <!-- Header -->
    <div class="cart-header">
        <h2><i class="fas fa-shopping-cart me-2"></i>Giỏ Hàng</h2>
    </div>

    <!-- Cart Content -->
    <div class="cart-container">
        <!-- Empty Cart Message -->
        <div th:if="${#lists.isEmpty(cartItems)}" class="cart-empty">
            <i class="fas fa-shopping-cart"></i>
            <p class="mt-3 fs-5 fw-semibold">Giỏ hàng của bạn đang trống</p>
            <a href="/products" class="btn btn-add mt-3" style="padding: 0.5rem 1.2rem;">
                <i class="fas fa-shopping-bag me-1"></i>Tiếp tục mua sắm
            </a>
        </div>

        <!-- Cart Table -->
        <div th:if="${!#lists.isEmpty(cartItems)}" class="cart-table">
            <table>
                <thead>
                    <tr>
                        <th style="width: 35%;">Sản Phẩm</th>
                        <th style="width: 15%;">Giá</th>
                        <th style="width: 15%;">Số Lượng</th>
                        <th style="width: 20%;">Tổng</th>
                        <th style="width: 15%;">Thao Tác</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="item : ${cartItems}">
                        <td>
                            <div class="product-info">
                                <img th:src="${item.product.image != null ? item.product.image : '/upload/images/default.jpg'}" 
                                     alt="Product" class="product-image"
                                     onerror="this.src='/upload/images/default.jpg'">
                                <span class="product-name" th:text="${item.product.name}"></span>
                            </div>
                        </td>
                        <td>
                            <span th:text="${#numbers.formatDecimal(item.product.price, 0, 'COMMA', 0, 'POINT')}"></span>đ
                        </td>
                        <td>
                            <form th:action="@{/cart/update}" method="post" style="display: flex; gap: 0.5rem; align-items: center;">
                                <input type="hidden" name="productId" th:value="${item.product.id}">
                                <input type="number" name="quantity" th:value="${item.quantity}" min="1" max="999" class="quantity-input">
                                <button type="submit" class="btn-update">Cập nhật</button>
                            </form>
                        </td>
                        <td>
                            <span class="price-value" th:text="${#numbers.formatDecimal(item.totalPrice, 0, 'COMMA', 0, 'POINT')}"></span>đ
                        </td>
                        <td>
                            <a th:href="@{/cart/remove/{id}(id=${item.product.id})}" class="btn-remove" 
                               onclick="return confirm('Bạn có chắc muốn xóa sản phẩm này khỏi giỏ?')">
                                <i class="fas fa-trash"></i> Xóa
                            </a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- Cart Summary -->
        <div th:if="${!#lists.isEmpty(cartItems)}" class="cart-summary">
            <div class="summary-row">
                <span>Số lượng sản phẩm:</span>
                <span class="price-value" th:text="${cartItems.size()}"></span>
            </div>
            <div class="summary-row">
                <span>Tổng số lượng:</span>
                <span class="price-value" th:text="${totalQuantity}"></span>
            </div>
            <div class="summary-row total">
                <span>Tổng tiền:</span>
                <span class="price-value" th:text="${#numbers.formatDecimal(totalPrice, 0, 'COMMA', 0, 'POINT')}"></span>đ
            </div>

            <!-- Action Buttons -->
            <div class="action-buttons">
                <a href="/products" class="btn-continue">
                    <i class="fas fa-arrow-left me-1"></i>Tiếp tục mua
                </a>
                <form th:action="@{/cart/checkout}" method="post" style="flex: 1;">
                    <button type="submit" class="btn-checkout">
                        <i class="fas fa-credit-card me-1"></i>Thanh toán
                    </button>
                </form>
            </div>

            <!-- Clear Cart -->
            <div style="text-align: center; margin-top: 1.5rem;">
                <a href="/cart/clear" class="btn-clear" 
                   onclick="return confirm('Bạn có chắc muốn xóa tất cả sản phẩm khỏi giỏ?')">
                    <i class="fas fa-trash-alt me-1"></i>Xóa toàn bộ giỏ
                </a>
            </div>
        </div>
    </div>
</div>
</body>
</html>
